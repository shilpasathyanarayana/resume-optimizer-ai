services:

  backend:
    build: ./backend
    container_name: resume_ai_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app
    env_file:
      - .env
    environment:
    - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - redis
      - db

  redis:
    image: redis:alpine
    container_name: resume_ai_redis
    ports:
      - "6379:6379"

  db:
    image: mariadb:11
    container_name: resume_ai_mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  phpmyadmin:                  # ← add this new service
    image: phpmyadmin/phpmyadmin
    container_name: resume_ai_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: resume_ai_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend

  worker:
    build: ./backend
    container_name: resume_ai_worker
    command: celery -A app.celery_app worker --loglevel=info
    volumes:
      - ./backend/app:/app
    env_file:
      - .env
    depends_on:
      - redis
      - db
      
volumes:
  mariadb_data:
